<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title></title>

<link rel="stylesheet" href="styles.css">

</head>

<body>

<header>

<h1>Respuestas rápidas</h1>

<div class="actions">

<input id="search" placeholder="Buscar... (Ctrl + K)">

<button id="newBtn">＋ Nuevo</button>

</div>

</header>


<main id="list"></main>



<div class="modal" id="modal">

<div class="modal-content">

<h2>Nueva respuesta</h2>

<input id="titleInput" placeholder="Título">

<textarea id="textInput" placeholder="Mensaje"></textarea>

<div class="modal-actions">

<button id="saveBtn">Guardar</button>

<button id="cancelBtn">Cancelar</button>

</div>

</div>

</div>



<script>

let respuestas = JSON.parse(localStorage.getItem("respuestas")) || []

const list = document.getElementById("list")
const search = document.getElementById("search")

const modal = document.getElementById("modal")
const newBtn = document.getElementById("newBtn")
const cancelBtn = document.getElementById("cancelBtn")
const saveBtn = document.getElementById("saveBtn")

const titleInput = document.getElementById("titleInput")
const textInput = document.getElementById("textInput")



function guardar(){

localStorage.setItem("respuestas", JSON.stringify(respuestas))

}



function copiarTexto(texto,item){

navigator.clipboard.writeText(texto)

item.classList.add("copied")

let aviso = document.createElement("div")
aviso.className="copiedLabel"
aviso.innerText="Copiado ✓"

item.appendChild(aviso)

setTimeout(()=>{

item.classList.remove("copied")
aviso.remove()

},900)

}



function render(){

const q = search.value.toLowerCase()

let filtradas = respuestas.filter(r =>
r.title.toLowerCase().includes(q)
)

list.innerHTML=""



filtradas.forEach((r,i)=>{

const item=document.createElement("div")

item.className="item"



item.innerHTML=`

<div class="info">

<h3>${r.title}</h3>
<p>${r.text}</p>

</div>

<div class="buttons">

<button class="copy">Copiar</button>
<button class="edit">✏</button>
<button class="delete">🗑</button>

</div>

`



item.addEventListener("click",(e)=>{

if(e.target.tagName==="BUTTON") return

copiarTexto(r.text,item)

})



item.querySelector(".copy").onclick=(e)=>{

e.stopPropagation()

copiarTexto(r.text,item)

}



item.querySelector(".delete").onclick=(e)=>{

e.stopPropagation()

respuestas.splice(i,1)

guardar()

render()

}



item.querySelector(".edit").onclick=(e)=>{

e.stopPropagation()

titleInput.value=r.title
textInput.value=r.text

modal.style.display="flex"

saveBtn.onclick=()=>{

r.title=titleInput.value
r.text=textInput.value

guardar()

modal.style.display="none"

render()

}

}



list.appendChild(item)

})

}



newBtn.onclick=()=>{

modal.style.display="flex"

titleInput.value=""
textInput.value=""

titleInput.focus()

}



cancelBtn.onclick=()=>{

modal.style.display="none"

}



saveBtn.onclick=()=>{

if(titleInput.value.trim()==="") return



respuestas.unshift({

title:titleInput.value,
text:textInput.value

})



guardar()

modal.style.display="none"

render()

}



search.addEventListener("input",render)



document.addEventListener("keydown",(e)=>{

if(e.ctrlKey && e.key==="k"){

e.preventDefault()

search.focus()

}



if(e.ctrlKey && e.key==="n"){

e.preventDefault()

newBtn.click()

}



if(e.key==="Enter" && document.activeElement===titleInput){

e.preventDefault()

saveBtn.click()

}

})



render()

</script>

</body>

</html>
